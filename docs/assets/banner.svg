<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="Keel — minimal load-bearing kernel for Claude Code">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#111c31"/>
      <stop offset="100%" stop-color="#0a1a2b"/>
    </linearGradient>
    <linearGradient id="hull" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0"/>
      <stop offset="18%" stop-color="#2b5c8f" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#4a9fd8" stop-opacity="0.9"/>
      <stop offset="82%" stop-color="#2b5c8f" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="keelline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0"/>
      <stop offset="30%" stop-color="#7dd3fc" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#7dd3fc" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- waterline -->
  <line x1="0" y1="196" x2="1200" y2="196" stroke="#7dd3fc" stroke-opacity="0.12" stroke-width="1"/>

  <!-- hull ribs: the structure the keel carries -->
  <g stroke="url(#hull)" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 300 196 Q 600 120 900 196" opacity="0.30"/>
    <path d="M 340 210 Q 600 142 860 210" opacity="0.40"/>
    <path d="M 380 224 Q 600 164 820 224" opacity="0.55"/>
    <path d="M 420 238 Q 600 186 780 238" opacity="0.70"/>
  </g>

  <!-- the keel itself: the spine that holds it all and adds nothing -->
  <path d="M 250 252 L 950 252" stroke="url(#keelline)" stroke-width="3" stroke-linecap="round"/>

  <!-- wordmark -->
  <text x="600" y="140" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace"
        font-size="96" font-weight="600" letter-spacing="14" fill="#f1f5f9">keel</text>

  <text x="600" y="180" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace"
        font-size="17" letter-spacing="3.5" fill="#7dd3fc" fill-opacity="0.85">minimal load-bearing kernel for Claude Code</text>

  <text x="600" y="285" text-anchor="middle"
        font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace"
        font-size="13" letter-spacing="1.5" fill="#94a3b8" fill-opacity="0.6">the part of the ship you don't see: it holds everything and adds nothing</text>
</svg>
