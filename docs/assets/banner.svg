<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" width="1200" height="440" role="img" aria-label="Keel — minimal load-bearing kernel for Claude Code">
  <defs>
    <!-- polished-metal wordmark: silver crown fading to steel -->
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#f6f9fd"/>
      <stop offset="42%" stop-color="#dbe7f4"/>
      <stop offset="72%" stop-color="#a9bed6"/>
      <stop offset="100%" stop-color="#8298b4"/>
    </linearGradient>
    <!-- accent underline: cool blue drifting to a warm ember, like the reference -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#4a9fd8"/>
      <stop offset="55%" stop-color="#8a7cf0"/>
      <stop offset="100%" stop-color="#e0654a"/>
    </linearGradient>
    <radialGradient id="halo" cx="15%" cy="22%" r="55%">
      <stop offset="0%"  stop-color="#2a5a92" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#132844" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#08090c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- deep, near-black field -->
  <rect width="1200" height="440" fill="#08090c"/>
  <rect width="1200" height="440" fill="url(#halo)"/>

  <!-- eyebrow: dot + tracked kicker -->
  <circle cx="88" cy="93" r="5" fill="#4a9fd8"/>
  <circle cx="88" cy="93" r="9.5" fill="none" stroke="#4a9fd8" stroke-opacity="0.28" stroke-width="1"/>
  <text x="112" y="99"
        font-family="'SF Mono', SFMono-Regular, Menlo, Consolas, monospace"
        font-size="16" letter-spacing="6.5" fill="#7c8698">KEEL · LOAD-BEARING KERNEL · v1.7 · BOGDANOV</text>

  <!-- wordmark -->
  <text x="72" y="300"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="190" font-weight="800" letter-spacing="-4" fill="url(#metal)">keel</text>

  <!-- subtitle, two lines, in the reference's confident blue -->
  <text x="80" y="352"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="500" fill="#6ba4e6">A minimal, load-bearing kernel for Claude Code.</text>
  <text x="80" y="383"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="22" font-weight="500" fill="#6ba4e6">It holds everything, and adds nothing.</text>

  <!-- accent underline -->
  <rect x="80" y="414" width="232" height="3" rx="1.5" fill="url(#accent)"/>
</svg>
